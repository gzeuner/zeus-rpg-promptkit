<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zeus Prompt Workbench</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background: #f6f1e6;
        color: #1f2933;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .panel {
        max-width: 680px;
        background: #fffaf0;
        border: 1px solid #d4c3a3;
        border-radius: 16px;
        padding: 24px;
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        color: #8a4b08;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Prompt Workbench lives in Zeus Local UI</h1>
      <p>
        Start <code>zeus serve --source-output-root ./output --port 4782</code> and open the local
        UI root to access the integrated Prompt Workbench, Prompt Compare, and artifact explorer.
      </p>
    </div>
  </body>
</html>
