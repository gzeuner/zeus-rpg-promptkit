name: "Bug"
description: "Something is broken"
title: "Bug: <short title>"
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should happen?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What happens instead?"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact / priority
      placeholder: "P0/P1/P2 and why"
    validations:
      required: true
  - type: textarea
    id: hints
    attributes:
      label: Suspected location
      placeholder: "Files, commits, stack traces"
    validations:
      required: false
