name: "Epic (V2)"
description: "Epic for Version 2 roadmap"
title: "EPIC: <short title>"
labels: ["epic", "enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: "What outcome does this epic deliver?"
      placeholder: "Outcome + success metrics"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope (In / Out)
      description: "Define what is included and explicitly excluded."
      placeholder: |
        In:
        - ...
        Out:
        - ...
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Work items (Issues)
      description: "Checklist of issues that belong to this epic."
      placeholder: |
        - [ ] #123 Feature: ...
        - [ ] #124 Enabler: ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Epic acceptance criteria
      description: "How do we know the epic is done?"
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
