name: Sync Issues from V2_ROADMAP

# Disabled on push/PR per package 10 (CI Quality and Release Gates):
# The public repository no longer contains internal V2_ROADMAP.md or the
# supporting script. This workflow is kept for manual/internal use only
# and must not fail default CI.
on:
  workflow_dispatch:
    inputs:
      roadmap_mode:
        description: 'auto, create, or sync-linked'
        required: false
        default: 'auto'
      allow_duplicates:
        description: 'Allow creating a new epic even if an epic with same title already exists'
        required: false
        default: 'false'
      update_existing:
        description: 'Update GitHub issues to match the roadmap format in use'
        required: false
        default: 'false'
      dry_run:
        description: 'Dry run (no API writes); useful for parsing and drift checks'
        required: false
        default: 'false'
      roadmap_path:
        description: 'Roadmap file path'
        required: false
        default: 'V2_ROADMAP.md'

permissions:
  issues: write
  contents: read

jobs:
  create_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync issues from roadmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: https://api.github.com
          ROADMAP_MODE: ${{ github.event.inputs.roadmap_mode }}
          ALLOW_DUPLICATES: ${{ github.event.inputs.allow_duplicates }}
          UPDATE_EXISTING: ${{ github.event.inputs.update_existing }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ROADMAP_PATH: ${{ github.event.inputs.roadmap_path }}
        run: |
          python scripts/create_issues_from_roadmap.py

      - name: Upload CREATED_ISSUES.md artifact
        if: ${{ hashFiles('CREATED_ISSUES.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: created-issues-${{ github.run_number }}
          path: CREATED_ISSUES.md
          if-no-files-found: error
