name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (format, lint, typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:discovery
      - run: npm run test:release-integrity
      - run: npm run test:cli-help
      - run: npm run check:repo-portability
      - run: npm run check:public-knowledge-claims
      - run: npm run test:quality
      - run: npm run test:benchmark
      - run: npm run package:smoke
      - run: npm run docs:check
      - run: npm run demo:safety-check

  test-linux-20:
    name: Test Node 20 (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test
      - name: Repository control security (real symlink escape proof)
        run: npm run test:repository-control

  test-linux-lts:
    name: Test current LTS (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test

  test-windows-20:
    name: Test Node 20 (windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test
      - run: npm run package:smoke

  test-windows-22:
    name: Test Node 22 (windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test
      - name: Repository control security tests
        run: npm run test:repository-control
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - run: npm run package:smoke

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run package:smoke

  community-container:
    name: Community Container Reference
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:deployment:community
      - name: Validate Compose model
        run: ZEUS_PROVIDER_ENDPOINT=http://127.0.0.1:11434 ZEUS_PROVIDER_MODEL=ci-synthetic docker compose --profile zeus config --quiet
      - name: Build community image
        run: docker build --pull --tag zeus-rpg-promptkit:community-ci .
      - name: Run offline non-root help smoke
        run: >-
          docker run --rm --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m
          --mount type=tmpfs,destination=/data/artifacts
          zeus-rpg-promptkit:community-ci --help
  # Boundary guards run in parallel via their own workflows (distinct security value).
  # See demo-safety-check.yml, public-knowledge-claims.yml, runtime-config-boundary.yml

  repository-control:
    name: Repository Control (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    needs: [quality, test-linux-20, test-linux-lts, test-windows-20, test-windows-22, package-smoke]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run repository control for this PR (read-only, after other checks)
        run: |
          node scripts/repository-control.js --scope pr --pr "${{ github.event.pull_request.number }}" --local-sha "${{ github.event.pull_request.head.sha }}" --wait --strict --timeout-seconds 300
        env:
          GH_TOKEN: ${{ github.token }}

  repository-control-main:
    name: Repository Control Main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    needs: [quality, test-linux-20, test-linux-lts, test-windows-20, test-windows-22, package-smoke]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run repository control for this exact main commit
        run: node scripts/repository-control.js --scope main --wait --strict --timeout-seconds 300
        env:
          GH_TOKEN: ${{ github.token }}
