name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (format, lint, typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:discovery
      - run: npm run check:repo-portability
      - run: npm run check:public-knowledge-claims
      - run: npm run test:quality
      - run: npm run test:benchmark
      - run: npm run package:smoke
      - run: npm run docs:check
      - run: npm run demo:safety-check

  test-linux-20:
    name: Test Node 20 (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test

  test-linux-lts:
    name: Test current LTS (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test

  test-windows-20:
    name: Test Node 20 (windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:discovery
      - run: npm test

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run package:smoke

  # Boundary guards run in parallel via their own workflows (distinct security value).
  # See demo-safety-check.yml, public-knowledge-claims.yml, runtime-config-boundary.yml

  repository-control:
    name: Repository Control (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run repository control for this PR (read-only)
        run: |
          PR_NUMBER=$(gh pr view --json number -q .number)
          node scripts/repository-control.js --scope pr --pr "$PR_NUMBER" --strict --timeout-seconds 300
        env:
          GH_TOKEN: ${{ github.token }}
