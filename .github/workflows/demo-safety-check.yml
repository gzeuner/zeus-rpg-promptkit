name: Demo Safety Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  demo-safety-check:
    name: Demo Safety Corpus Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run demo safety check
        run: npm run demo:safety-check
