name: Public Knowledge Claims

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-knowledge-claims:
    name: Public Knowledge Claims Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run public knowledge-claims guard
        run: npm run check:public-knowledge-claims
